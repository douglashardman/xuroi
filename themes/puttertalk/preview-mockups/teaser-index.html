<style>
:root{--ink:#1a1a1a;--pink:#e00080;--blue:#20c0f0;--green:#90c040}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;flex-direction:column;background:#fff;color:var(--ink);font:400 17px/1.6 'Open Sans',sans-serif;-webkit-font-smoothing:antialiased}
.stripe{height:8px;display:flex}.stripe i{flex:1}.stripe .a{background:var(--green)}.stripe .b{background:var(--pink)}.stripe .c{background:var(--blue)}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px}
.box{max-width:640px;text-align:center}
.ey{font-family:'Poppins';font-weight:700;text-transform:uppercase;letter-spacing:.16em;font-size:12px;color:var(--pink);margin-bottom:26px}
.bug{width:140px;height:auto;filter:drop-shadow(6px 6px 0 rgba(0,0,0,.10))}
.script{display:block;width:340px;max-width:80%;margin:26px auto 8px}
h1{font-family:'Poppins';font-weight:800;letter-spacing:-.02em;font-size:clamp(38px,7vw,60px);margin:18px 0 0;line-height:1.02}
h1 em{font-style:normal;color:var(--pink)}
p.lead{font-size:19px;color:#444;max-width:46ch;margin:20px auto 30px}
.social{display:flex;gap:14px;justify-content:center;margin-bottom:30px}
.social a{width:48px;height:48px;border:3px solid var(--ink);border-radius:13px;display:grid;place-items:center;color:var(--ink);box-shadow:4px 4px 0 var(--ink);transition:transform .12s,box-shadow .12s,background .12s,border-color .12s,color .12s}
.social a:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--ink);background:var(--pink);border-color:var(--pink);color:#fff}
.social svg{width:22px;height:22px;fill:currentColor}
.discord{display:inline-flex;align-items:center;gap:10px;font-family:'Poppins';font-weight:700;font-size:16px;text-decoration:none;color:#fff;background:#5865F2;border:3px solid var(--ink);border-radius:13px;padding:12px 22px;box-shadow:5px 5px 0 var(--ink);margin-bottom:26px;transition:transform .12s,box-shadow .12s}.discord:hover{transform:translate(-2px,-2px);box-shadow:7px 7px 0 var(--ink)}.say{font-family:'Poppins';font-weight:600;font-size:14px;color:#888}
.say a{color:var(--pink);text-decoration:none}
footer{padding:20px;text-align:center;font-family:'Poppins';font-weight:500;font-size:12.5px;color:#999;border-top:1px solid #eee}
</style>
