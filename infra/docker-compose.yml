services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: xuroi
      POSTGRES_PASSWORD: xuroi_dev
      POSTGRES_DB: xuroi
    ports:
      - "5433:5432"
    volumes:
      - xuroi_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: xuroi
      MINIO_ROOT_PASSWORD: xuroi_dev_min
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - xuroi_minio:/data

volumes:
  xuroi_pg:
  xuroi_minio: